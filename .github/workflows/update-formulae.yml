name: Formula E Takvim Kontrolu

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  formulae-check:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Requests paketini kur
        run: python -m pip install requests

      - name: Formula E kaynagini kontrol et
        run: python scripts/update_formulae.py
